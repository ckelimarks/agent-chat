<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Status Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 40px;
      min-height: 100vh;
    }

    h1 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 20px;
    }

    .agent-list {
      width: 280px;
      background: #16162a;
      border-radius: 12px;
      overflow: hidden;
    }

    .agent {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #ffffff08;
    }

    .agent:hover {
      background: #ffffff08;
    }

    .agent:last-child {
      border-bottom: none;
    }

    /* Avatar with status ring */
    .avatar-container {
      position: relative;
      width: 36px;
      height: 36px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* Status indicator dot */
    .status-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #16162a;
    }

    /* Agent info */
    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }

    .agent-status {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    /* Notification badge (right side) */
    .notification-badge {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ============ STATES ============ */

    /* Idle - gray dot, no badge */
    .state-idle .status-dot {
      background: #666;
    }

    /* Working - fading border + fading row */
    .state-working .avatar {
      border: 2px solid #3b82f6;
      animation: border-fade 2s ease-in-out infinite;
    }

    .state-working .status-dot {
      background: #3b82f6;
    }

    .state-working .agent-status {
      color: #3b82f6;
    }

    .state-working {
      animation: row-fade 2s ease-in-out infinite;
    }

    /* Attention - orange pulsing badge */
    .state-attention .status-dot {
      background: #f97316;
    }

    .state-attention .notification-badge {
      background: #f97316;
      animation: pulse-orange 1s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4);
    }

    .state-attention .agent-status {
      color: #f97316;
    }

    /* Done - green badge */
    .state-done .status-dot {
      background: #22c55e;
    }

    .state-done .notification-badge {
      background: #22c55e;
    }

    .state-done .agent-status {
      color: #22c55e;
    }

    /* ============ ANIMATIONS ============ */

    @keyframes border-fade {
      0%, 100% { border-color: #3b82f6; }
      50% { border-color: #3b82f620; }
    }

    @keyframes row-fade {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes pulse-orange {
      0% {
        box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6);
      }
      70% {
        box-shadow: 0 0 0 8px rgba(249, 115, 22, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(249, 115, 22, 0);
      }
    }

    /* ============ LEGEND ============ */

    .legend {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 13px;
      color: #888;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.gray { background: #666; }
    .legend-dot.blue { background: #3b82f6; animation: row-fade 2s ease-in-out infinite; }
    .legend-dot.orange { background: #f97316; animation: pulse-orange 1s ease-in-out infinite; }
    .legend-dot.green { background: #22c55e; }

  </style>
</head>
<body>
  <h1>Agent States</h1>

  <div class="agent-list">
    <div class="agent state-idle">
      <div class="avatar-container">
        <div class="avatar">🔍</div>
        <div class="status-dot"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name">Research Agent</div>
        <div class="agent-status">Idle</div>
      </div>
    </div>

    <div class="agent state-working">
      <div class="avatar-container">
        <div class="avatar">🛠️</div>
        <div class="status-dot"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name">Builder Agent</div>
        <div class="agent-status">Working...</div>
      </div>
    </div>

    <div class="agent state-attention">
      <div class="avatar-container">
        <div class="avatar">🧪</div>
        <div class="status-dot"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name">Test Agent</div>
        <div class="agent-status">Needs approval</div>
      </div>
      <div class="notification-badge"></div>
    </div>

    <div class="agent state-done">
      <div class="avatar-container">
        <div class="avatar">📊</div>
        <div class="status-dot"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name">Analyst Agent</div>
        <div class="agent-status">Done</div>
      </div>
      <div class="notification-badge"></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot gray"></div> Idle - waiting for task</div>
    <div class="legend-item"><div class="legend-dot blue"></div> Working - actively processing</div>
    <div class="legend-item"><div class="legend-dot orange"></div> Attention - needs approval</div>
    <div class="legend-item"><div class="legend-dot green"></div> Done - task complete</div>
  </div>
</body>
</html>
